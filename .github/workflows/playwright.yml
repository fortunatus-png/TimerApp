name: Playwright Tests

on:
  push:
    branches: [ main, master, feat/playwright-tests ]
  pull_request:
    branches: [ main, master, feat/playwright-tests ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*
    
    # Backend Setup
    - name: Install Python dependencies
      run: |
        cd backend
        python -m venv venv
        source venv/bin/activate
        pip install -r requirements.txt
    
    - name: Start Backend
      run: |
        cd backend
        source venv/bin/activate
        fastapi dev > /tmp/backend.log 2>&1 &
        echo $! > /tmp/backend.pid
        sleep 3
      timeout-minutes: 1
    
    # Frontend Setup
    - name: Install Node dependencies
      run: |
        cd frontend
        npm install
    
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    
    - name: Initialize Test Database
      run: |
        cd backend
        source venv/bin/activate
        python << 'EOF'
        import sqlite3
        import bcrypt

        conn = sqlite3.connect('sessions.db')
        cursor = conn.cursor()

        # Create tables
        cursor.execute('''
            CREATE TABLE IF NOT EXISTS users (
                id INTEGER PRIMARY KEY AUTOINCREMENT,
                email TEXT UNIQUE NOT NULL,
                password TEXT NOT NULL,
                created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
            )
        ''')

        cursor.execute('''
            CREATE TABLE IF NOT EXISTS sessions (
                id INTEGER PRIMARY KEY AUTOINCREMENT,
                user_id INTEGER NOT NULL,
                date TEXT NOT NULL,
                minutes INTEGER NOT NULL,
                hour INTEGER NOT NULL,
                FOREIGN KEY (user_id) REFERENCES users(id) ON DELETE CASCADE
            )
        ''')

        cursor.execute('''
            CREATE TABLE IF NOT EXISTS tokens (
                id INTEGER PRIMARY KEY AUTOINCREMENT,
                token TEXT UNIQUE NOT NULL,
                user_id INTEGER NOT NULL,
                created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
                expires_at TIMESTAMP NOT NULL,
                FOREIGN KEY (user_id) REFERENCES users(id) ON DELETE CASCADE
            )
        ''')

        # Create test users
        salt = bcrypt.gensalt()
        hashed = bcrypt.hashpw(b'stringst', salt).decode()

        try:
          cursor.execute(
              "INSERT INTO users (email, password) VALUES (?, ?)",
              ('user@example.com', hashed)
          )
          conn.commit()
          print("Test user created: user@example.com")
        except sqlite3.IntegrityError:
          print("Test user already exists")

        conn.close()
        EOF
              timeout-minutes: 1
            
            - name: Wait for Backend to be ready
              run: |
                for i in {1..15}; do
                  if curl -f http://localhost:8000 2>/dev/null; then
                    echo "✓ Backend is ready"
                    exit 0
                  fi
                  echo "⏳ Waiting for backend... ($i/15)"
                  sleep 2
                done
                echo "✗ Backend failed to start"
                cat /tmp/backend.log
                exit 1
              timeout-minutes: 2
            
            - name: Run Playwright tests
              run: npx playwright test
              timeout-minutes: 55
            
            - name: Upload Playwright Report
              uses: actions/upload-artifact@v4
              if: always()
              with:
                name: playwright-report
                path: playwright-report/
                retention-days: 30
            
            - name: Stop Backend
              if: always()
              run: |
                if [ -f /tmp/backend.pid ]; then
                  kill $(cat /tmp/backend.pid) 2>/dev/null || true
                fi