services:
  db:
    image: alpine:3.20
    container_name: studyapp-db
    command: sh -c "mkdir -p /data && touch /data/sessions.db && tail -f /dev/null"
    volumes:
      - db_data:/data
    healthcheck:
      test: ["CMD-SHELL", "test -f /data/sessions.db"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: studyapp-backend
    environment:
      DB_PATH: /data/sessions.db
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - db_data:/data

  frontend:
    build:
      context: ./frontend
    container_name: studyapp-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  db_data:
